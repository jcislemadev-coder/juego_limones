<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Atrapar Limones</title>
  <link rel="stylesheet" href="limones.css"/>
  <script src="utils.js"></script>
</head>

<body onload="iniciar()">
  <div class="contenedor">

    <header class="header">
      <div class="logo-container">
  <img src="logo.png" alt="Logo del juego" class="logo">
</div>
      <h1 class="titulo">🍋 Atrapar Limones</h1>
      <p class="subtitulo">Si del cielo te caen limones... ¡haz un jugo!</p>
      <p class="autor">Autora: Jessica Cislema</p>
    </header>

    <section class="juego">
      <canvas id="areajuego" width="600" height="400"></canvas>
    </section>

    <section class="panel">
      <div class="info">
        <div class="card">
          <span class="label">Puntaje</span>
          <span id="txtPuntaje" class="valor">0</span>
        </div>

        <div class="card">
          <span class="label">Vidas</span>
          <span id="txtVidas" class="valor">2</span>
        </div>
      </div>
    </section>

    <section class="botones">
      <button onclick="moverDerecha();" class="btn">⬅ Izquierda</button>
      <button onclick="moverIzquierda();" class="btn">Derecha ➡</button>
      <button onclick="reiniciar();" class="btn reset">🔄 Reiniciar</button>
    </section>

  </div>

  <script src="limones.js"></script>
</body>
</html>
